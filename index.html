<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Weather App — Consultá el clima de cualquier ciudad" />
    <title>WeatherNow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=Syne:wght@700;800&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
</head>

<body>

    <div class="app-wrapper">

        <!-- HEADER -->
        <header class="header">
            <div class="logo"><span class="logo-icon" id="logoIcon">⛅</span> WeatherNow</div>
            <p class="tagline">El clima de cualquier ciudad, al instante</p>
        </header>

        <!-- BÚSQUEDA -->
        <section class="search-section">
            <div class="search-box">
                <input type="text" id="cityInput" placeholder="Buscá una ciudad... ej: Buenos Aires"
                    autocomplete="off" />
                <button id="searchBtn">Buscar</button>
            </div>
            <p class="search-hint">Presioná Enter o hacé clic en Buscar</p>
        </section>

        <!-- ESTADO INICIAL -->
        <div class="empty-state" id="emptyState">
            <div class="empty-icon">🌍</div>
            <p>Ingresá una ciudad para ver el clima</p>
        </div>

        <!-- ERROR -->
        <div class="error-state hidden" id="errorState">
            <div class="empty-icon">❌</div>
            <p id="errorMsg">Ciudad no encontrada. Intentá con otro nombre.</p>
        </div>

        <!-- LOADING -->
        <div class="loading hidden" id="loading">
            <div class="spinner"></div>
            <p>Buscando clima...</p>
        </div>

        <!-- RESULTADO PRINCIPAL -->
        <section class="weather-card hidden" id="weatherCard">

            <div class="card-top">
                <div class="city-info">
                    <h1 id="cityName">—</h1>
                    <p id="countryName">—</p>
                </div>
                <div class="weather-icon" id="weatherIcon">🌤️</div>
            </div>

            <div class="temp-main">
                <span id="temperature">—</span>
                <span class="unit">°C</span>
            </div>

            <p class="description" id="description">—</p>

            <div class="details-grid">
                <div class="detail-item">
                    <span class="detail-icon">💧</span>
                    <span class="detail-label">Humedad</span>
                    <span class="detail-value" id="humidity">—</span>
                </div>
                <div class="detail-item">
                    <span class="detail-icon">💨</span>
                    <span class="detail-label">Viento</span>
                    <span class="detail-value" id="wind">—</span>
                </div>
                <div class="detail-item">
                    <span class="detail-icon">🌡️</span>
                    <span class="detail-label">Sensación</span>
                    <span class="detail-value" id="feelsLike">—</span>
                </div>
                <div class="detail-item">
                    <span class="detail-icon">☁️</span>
                    <span class="detail-label">Nubosidad</span>
                    <span class="detail-value" id="clouds">—</span>
                </div>
            </div>

            <div class="card-footer">
                <span id="lastUpdated">—</span>
            </div>

        </section>

        <!-- CIUDADES RÁPIDAS -->
        <section class="quick-cities">
            <p class="quick-label">Búsquedas rápidas</p>
            <div class="quick-buttons">
                <button class="quick-btn" data-city="Buenos Aires">Buenos Aires</button>
                <button class="quick-btn" data-city="Madrid">Madrid</button>
                <button class="quick-btn" data-city="New York">New York</button>
                <button class="quick-btn" data-city="Tokyo">Tokyo</button>
                <button class="quick-btn" data-city="London">London</button>
                <button class="quick-btn" data-city="Sydney">Sydney</button>
            </div>
        </section>

    </div>

    <script src="js/main.js"></script>
</body>

</html>
